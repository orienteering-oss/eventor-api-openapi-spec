  /wrsevents:
    get:
      summary: Returns events that have at least one race linked to a WRS (World Ranking System) event.
      description: |
        Only available on the International Eventor instance
        (`eventor.orienteering.sport`).
      parameters:
        - in: query
          name: fromDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Start time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: End time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: fromModifyDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Includes only events that have changed after this time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toModifyDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: Includes only events that have changed before this time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: eventIds
          schema:
            type: string
          description: Comma-separated list of event IDs.
        - in: query
          name: organisationIds
          schema:
            type: string
          description: Comma-separated list of organising organisation IDs.
        - in: query
          name: classificationIds
          schema:
            type: string
          description: Comma-separated list of event classification IDs.
        - in: query
          name: includeEntryBreaks
          schema:
            type: boolean
            default: false
          description: Set to `true` to include the entry deadlines of the event.
        - in: query
          name: includeAttributes
          schema:
            type: boolean
            default: false
          description: Set to `true` to include the event's event attributes.
        - in: query
          name: parentIds
          schema:
            type: string
          description: If filtering on parent events, comma-separated list of IDs for parent events.
      responses:
        "200":
          description: XML element `EventList`
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/EventList'

  /events/documents:
    get:
      summary: Returns a list with documents for the events matching the search parameters.
      parameters:
        - in: query
          name: fromDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Start time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: End time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: eventIds
          schema:
            type: string
            example: 8248,15365
          description: Comma-separated list of event IDs. Omit to include all events.
        - in: query
          name: organisationIds
          schema:
            type: string
            example: 273,89
          description: Comma-separated list of organisation IDs for the organising clubs. If a state's organisation ID is specified, all events organised by a club in that state will be included. Omit to include all events.
      responses:
        "200":
          description: XML element `DocumentList`
          content:
            application/xml:
              schema:
                type: array
                xml:
                  name: DocumentList
                  wrapped: true
                items:
                  xml:
                    name: Document
                  type: object
                  properties:
                    id:
                      type: integer
                      xml:
                        attribute: true
                    referenceId:
                      type: integer
                      xml:
                        attribute: true
                    name:
                      type: string
                      xml:
                        attribute: true
                    url:
                      type: string
                      format: uri
                      xml:
                        attribute: true
                    type:
                      type: string
                      enum:
                        - Invitation
                        - Other
                        - Program
                      xml:
                        attribute: true
                    modifyDate:
                      type: string
                      format: date-time
                      xml:
                        attribute: true
                  additionalProperties: false


  /event/{eventId}:
    get:
      summary: Returns an event.
      parameters:
        - in: path
          name: eventId
          schema:
            type: integer
            example: 8248
          required: true
          description: The ID of the event as specified by `/events`.
      responses:
        "200":
          description: XML element `Event`
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/Event'

  /event/iofxml/{eventId}:
    get:
      summary: Returns a single event in IOF XML 3.0 format.
      description: |
        IOF XML 3.0 variant of `/event/{eventId}`. Eventor-specific data is
        carried in `<Extensions>` elements (namespace
        `http://eventor.orientering.se/iofxmlextensions`).

        Officially listed on the Australian and International API
        documentation pages, but also works on the Norwegian and Swedish
        instances.
      parameters:
        - in: path
          name: eventId
          schema:
            type: integer
            example: 8248
          required: true
          description: The ID of the event as specified by `/events`.
      responses:
        "200":
          description: IOF XML 3.0 `EventList` with a single `Event`
          content:
            application/xml:
              schema:
                type: string
                description: |
                  IOF XML 3.0 format. The IOF-defined structure follows the
                  [IOF datastandard-v3 XSD](https://github.com/international-orienteering-federation/datastandard-v3)
                  and is not duplicated here.

                  Eventor-specific data is carried in `<Extensions>` elements
                  (namespace `http://eventor.orientering.se/iofxmlextensions`,
                  prefix `eventor:`) — see the `EventorExtensions` component
                  schema for the supported children and their types.

