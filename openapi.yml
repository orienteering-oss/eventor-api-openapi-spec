    EventorDiscipline:
      type: string
      description: |
        Eventor's discipline classification for the event or race.
        May appear multiple times on the same parent — the value set lists every
        discipline the event/race accommodates.
      enum:
        - Foot
        - MountainBike
        - Ski
        - Trail
        - Indoor
      xml:
        name: Discipline
        namespace: http://eventor.orientering.se/iofxmlextensions
        prefix: eventor
    EventorLightCondition:
      type: string
      description: Light condition for the race.
      enum:
        - Day
        - Night
        - DayAndNight
      xml:
        name: LightCondition
        namespace: http://eventor.orientering.se/iofxmlextensions
        prefix: eventor
    EventorAttribute:
      type: object
      description: |
        A custom event attribute defined by the Eventor instance. The set of
        attributes is instance-specific — e.g. the Norwegian Eventor exposes
        attributes like `Flexoløp`, `Ukas løype` and `Paratilbud`.
      properties:
        _text:
          type: string
          description: Human-readable attribute name.
          example: Ukas løype
        id:
          type: integer
          example: 2
          xml:
            attribute: true
      required:
        - id
      xml:
        name: Attribute
        namespace: http://eventor.orientering.se/iofxmlextensions
        prefix: eventor
    EventorExtensions:
      type: object
      description: |
        Container for Eventor-specific elements that appear inside `<Extensions>`
        in IOF XML 3.0 responses. All children use the namespace
        `http://eventor.orientering.se/iofxmlextensions` (prefix `eventor:`).

        Which children appear depends on the parent IOF element:

        - On `Event`: `StartListExists`, `ResultListExists`, zero or more
          `Discipline`, zero or more `Attribute`.
        - On `Race`: `EventRaceId`, `StartListExists`, `ResultListExists`,
          zero or more `Discipline`, `LightCondition`.

        `Discipline` is repeatable — an event/race that allows multiple
        disciplines lists each one as a separate element.

        These extensions are not part of the public IOF XSD — see the IOF
        datastandard repository for the IOF-defined part of the response:
        https://github.com/international-orienteering-federation/datastandard-v3
      properties:
        EventRaceId:
          $ref: '#/components/schemas/EventorEventRaceId'
        StartListExists:
          $ref: '#/components/schemas/EventorStartListExists'
        ResultListExists:
          $ref: '#/components/schemas/EventorResultListExists'
        Discipline:
          type: array
          items:
            $ref: '#/components/schemas/EventorDiscipline'
          xml:
            name: Discipline
            namespace: http://eventor.orientering.se/iofxmlextensions
            prefix: eventor
            wrapped: false
        LightCondition:
          $ref: '#/components/schemas/EventorLightCondition'
        Attribute:
          type: array
          items:
            $ref: '#/components/schemas/EventorAttribute'
          xml:
            name: Attribute
            namespace: http://eventor.orientering.se/iofxmlextensions
            prefix: eventor
            wrapped: false
      xml:
        name: Extensions
security:
  - ApiKeyAuth: []

paths:
  
  /events:
    get:
      summary: Returns a list with the events matching the search parameters.
      parameters:
        - in: query
          name: fromDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Start time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: End time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: fromModifyDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Includes only events that have changed after this time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toModifyDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: Includes only events that have changed before this time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: eventIds
          schema:
            type: string
            example: 8248,15365
          description: Comma-separated list of event IDs. Omit to include all events.
        - in: query
          name: organisationIds
          schema:
            type: string
            example: "273,89"
          description: Comma-separated list of organisation IDs for the organising clubs. If a state's organisation ID is specified, all events organised by a club in that state will be included. Omit to include all events.
        - in: query
          name: classificationIds
          schema:
            type: string
            example: "4,5"
          description: Comma-separated list of event classification IDs, where 1=championship event, 2=national event, 3=state event, 4=local event, 5=club event, 6=international event. Omit to include all events.
        - in: query
          name: includeEntryBreaks
          schema:
            type: boolean
            default: false
          description: Set to `true` to include the entry deadlines of the event.
        - in: query
          name: includeAttributes
          schema:
            type: boolean
            default: false
          description: Set to `true` to include the event's event attributes.
        - in: query
          name: parentIds
          schema:
            type: string
            example: 1,2
          description: If filtering on parent events, comma-separated list of IDs for parent events.
      responses:
        "200":
          description: XML element `EventList`
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/EventList'

  /events/iofxml:
    get:
      summary: Returns events matching the search parameters in IOF XML 3.0 format.
      description: |
        Same filtering as `/events`, but the response is in IOF XML 3.0
        format (with Eventor-specific data carried in `<Extensions>` elements
        under the `http://eventor.orientering.se/iofxmlextensions` namespace).

        Officially listed on the Australian and International API documentation
        pages, but also works on the Norwegian and Swedish instances.
        Note: requesting without any filter (e.g. only `fromDate`/`toDate`)
        may return an error — supply at least `organisationIds` or `eventIds`.
      parameters:
        - in: query
          name: fromDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Start time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: End time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: fromModifyDate
          schema:
            type: string
            default: "0000-01-01 00:00:00"
          description: Includes only events that have changed after this time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: toModifyDate
          schema:
            type: string
            default: "9999-12-31 23:59:59"
          description: Includes only events that have changed before this time (yyyy-mm-dd hh:mm:ss).
        - in: query
          name: eventIds
          schema:
            type: string
            example: 8248,15365
          description: Comma-separated list of event IDs. Omit to include all events.
        - in: query
          name: organisationIds
          schema:
            type: string
            example: "273,89"
          description: Comma-separated list of organisation IDs for the organising clubs.
        - in: query
          name: classificationIds
          schema:
            type: string
            example: "4,5"
          description: Comma-separated list of event classification IDs (1=championship, 2=national, 3=state, 4=local, 5=club, 6=international).
        - in: query
          name: includeEntryBreaks
          schema:
            type: boolean
            default: false
          description: Set to `true` to include the entry deadlines of the event.
        - in: query
          name: includeAttributes
          schema:
            type: boolean
            default: false
          description: Set to `true` to include the event's event attributes.
        - in: query
          name: parentIds
          schema:
            type: string
            example: 1,2
          description: If filtering on parent events, comma-separated list of IDs for parent events.
      responses:
        "200":
          description: IOF XML 3.0 `EventList`
          content:
            application/xml:
              schema:
                type: string
                description: |
                  IOF XML 3.0 format. The IOF-defined structure follows the
                  [IOF datastandard-v3 XSD](https://github.com/international-orienteering-federation/datastandard-v3)
                  and is not duplicated here.

                  Eventor-specific data is carried in `<Extensions>` elements
                  (namespace `http://eventor.orientering.se/iofxmlextensions`,
                  prefix `eventor:`) — see the `EventorExtensions` component
                  schema for the supported children and their types.
                example: |-
                  <?xml version="1.0" encoding="utf-8"?>
                  <EventList xmlns:eventor="http://eventor.orientering.se/iofxmlextensions" xmlns="http://www.orienteering.org/datastandard/3.0" iofVersion="3.0">
                    <Event>
                      <Id type="Eventor">23514</Id>
                      <Name>OSI/GeoForm Rankingløp 1</Name>
                      <Race>
                        <RaceNumber>1</RaceNumber>
