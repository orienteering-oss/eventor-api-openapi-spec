openapi: 3.1.0

info:
  title: Eventor API
  description: |
    Eventor API
  version: "1.0.0"
  termsOfService: https://eventor.orientering.se/Home/About
  contact:
    name: Eventor
    url: https://eventor.orienteering.sport/api/documentation

servers:
  - url: https://eventor.orientering.no/api
    description: Norwegian Eventor API
  - url: https://eventor.orientering.se/api
    description: Swedish Eventor API
  - url: https://eventor.orienteering.asn.au/api
    description: Australian Eventor API
  - url: https://eventor.orienteering.sport/api
    description: International Eventor API

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: ApiKey
      in: header

  schemas:
    Activity:
      type: object
      properties:
        Name:
          $ref: '#/components/schemas/Name'
        Information:
          $ref: '#/components/schemas/Information'
        ActivityAttribute:
          type: array
          items:
            $ref: '#/components/schemas/ActivityAttribute'
          xml:
            name: ActivityAttribute
            wrapped: false
        ActivityRegistration:
          type: array
          items:
            $ref: '#/components/schemas/ActivityRegistration'
          xml:
            name: ActivityRegistration
            wrapped: false
        id:
          type: integer
          xml:
            attribute: true
        organisationId:
          type: integer
          xml:
            attribute: true
        visibleFrom:
          type: string
          format: date-time
          xml:
            attribute: true
        registrationDeadline:
          type: string
          format: date-time
          xml:
            attribute: true
        startTime:
          type: string
          format: date-time
          xml:
            attribute: true
        visibleTo:
          type: string
          format: date-time
          xml:
            attribute: true
        allowExternalRegistrations:
          type: boolean
          xml:
            attribute: true
        contactPersonId:
          type: integer
          xml:
            attribute: true
        registrationCount:
          type: integer
          xml:
            attribute: true
        url:
          type: string
          xml:
            attribute: true
        entryAccessLevel:
          type: string
          enum:
            - All
            - LoggedIn
            - Admin
          xml:
            attribute: true
        modifiedBy:
          type: integer
          xml:
            attribute: true
        modifyDate:
          type: string
          format: date-time
          xml:
            attribute: true
      required:
        - Name
        - allowExternalRegistrations
        - entryAccessLevel
        - id
        - organisationId
        - registrationCount
        - url
        - visibleFrom
        - visibleTo
      xml:
        name: Activity
    ActivityAttribute:
      type: object
      properties:
        Name:
          $ref: '#/components/schemas/Name'
        Information:
          $ref: '#/components/schemas/Information'
        Value:
          type: array
          items:
            $ref: '#/components/schemas/Value'
          xml:
            name: Value
            wrapped: false
        id:
          type: integer
          xml:
            attribute: true
        type:
          type: string
          enum:
            - Text
            - RadioButtons
            - CheckBoxes
            - SingleSelectList
            - MultiSelectList
          xml:
            attribute: true
        order:
          type: integer
          xml:
            attribute: true
        visibleInList:
          type: boolean
          default: 'true'
          xml:
            attribute: true
      required:
        - Name
        - id
        - order
        - type
      xml:
        name: ActivityAttribute
    ActivityList:
      type: object
      properties:
        Activity:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
          xml:
            name: Activity
            wrapped: false
      xml:
        name: ActivityList
    ActivityRegistration:
      type: object
      properties:
        AttributeValue:
          type: array
          items:
            type: object
            properties:
              activityAttributeId:
                type: integer
                xml:
                  attribute: true
            required:
              - activityAttributeId
          xml:
            name: AttributeValue
            wrapped: false
        personId:
          type: integer
          xml:
            attribute: true
        organisationId:
          type: integer
          xml:
            attribute: true
        modifiedBy:
          type: integer
          xml:
            attribute: true
        modifyDate:
          type: string
          format: date-time
          xml:
            attribute: true
      required:
        - personId
      xml:
        name: ActivityRegistration
    Address:
      type: object
      properties:
        AddressType:
          $ref: '#/components/schemas/AddressType'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
        careOf:
          type: string
          xml:
            attribute: true
        street:
          type: string
          xml:
            attribute: true
        city:
          type: string
          xml:
            attribute: true
        zipCode:
          type: string
          xml:
            attribute: true
      required:
        - city
        - street
      xml:
        name: Address
    AddressType:
      type: object
      properties:
        value:
          type: string
          xml:
            attribute: true
      required:
        - value
      xml:
        name: AddressType
    AgeGroup:
      type: object
      properties:
        Name:
          $ref: '#/components/schemas/Name'
      required:
        - Name
      xml:
        name: AgeGroup
    AllocationControl:
      type: object
      properties:
        AllocationControlType:
          $ref: '#/components/schemas/AllocationControlType'
      required:
        - AllocationControlType
      xml:
        name: AllocationControl
    AllocationControlType:
      type: object
      properties:
        value:
          type: string
          enum:
            - lateStart
            - normal
            - earlyStart
            - distributedFromRef
            - other
            - groupedWithRef
          default: normal
          xml:
            attribute: true
      xml:
        name: AllocationControlType
    Alpha2:
      type: object
      properties:
        value:
          type: string
          xml:
            attribute: true
      required:
        - value
      xml:
        name: Alpha2
    Alpha3:
      type: object
      properties:
        value:
          type: string
          xml:
            attribute: true
      required:
        - value
      xml:
        name: Alpha3
    AlternativeDates:
      type: object
      properties:
        Sequence:
          $ref: '#/components/schemas/Sequence'
        StartDate:
          $ref: '#/components/schemas/StartDate'
        FinishDate:
          $ref: '#/components/schemas/FinishDate'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - Sequence
        - StartDate
      xml:
        name: AlternativeDates
    Amount:
      type: object
      properties:
        _text:
          type: string
        currency:
          type: string
          xml:
            attribute: true
      xml:
        name: Amount
    BaseClass:
      type: object
      properties:
        BaseClassId:
          $ref: '#/components/schemas/BaseClassId'
        Name:
          $ref: '#/components/schemas/Name'
        ClassShortName:
          $ref: '#/components/schemas/ClassShortName'
        ParentOrganisation:
          $ref: '#/components/schemas/ParentOrganisation'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
        HashTableEntry:
          type: array
          items:
            $ref: '#/components/schemas/HashTableEntry'
          xml:
            name: HashTableEntry
            wrapped: false
        lowAge:
          type: string
          xml:
            attribute: true
        highAge:
          type: string
          xml:
            attribute: true
        sex:
          type: string
          enum:
            - B
            - F
            - M
          xml:
            attribute: true
        sequence:
          type: string
          xml:
            attribute: true
        numberInTeam:
          type: string
          default: 1
          xml:
            attribute: true
        timePresentation:
          type: string
          enum:
            - N
            - Y
          default: Y
          xml:
            attribute: true
      required:
        - BaseClassId
        - ClassShortName
        - ParentOrganisation
        - sex
      xml:
        name: BaseClass
    BaseClassGroup:
      type: object
      properties:
        BaseClassGroupId:
          $ref: '#/components/schemas/BaseClassGroupId'
        Name:
          $ref: '#/components/schemas/Name'
        ParentOrganisation:
          $ref: '#/components/schemas/ParentOrganisation'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - BaseClassGroupId
        - Name
        - ParentOrganisation
      xml:
        name: BaseClassGroup
    BaseClassGroupId:
      type: string
      xml:
        name: BaseClassGroupId
    BaseClassGroupList:
      type: object
      properties:
        BaseClassGroup:
          type: array
          items:
            $ref: '#/components/schemas/BaseClassGroup'
          xml:
            name: BaseClassGroup
            wrapped: false
      xml:
        name: BaseClassGroupList
    BaseClassId:
      type: string
      xml:
        name: BaseClassId
    BibNumber:
      type: string
      xml:
        name: BibNumber
    BirthDate:
      type: object
      properties:
        Date:
          $ref: '#/components/schemas/Date'
      required:
        - Date
      xml:
        name: BirthDate
    CCard:
      type: object
      properties:
        CCardId:
          $ref: '#/components/schemas/CCardId'
        PunchingUnitType:
          $ref: '#/components/schemas/PunchingUnitType'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - CCardId
        - PunchingUnitType
      xml:
        name: CCard
    CCardId:
      type: string
      xml:
        name: CCardId
    Championship:
      type: object
      properties:
        ChampionshipId:
          $ref: '#/components/schemas/ChampionshipId'
        Name:
          $ref: '#/components/schemas/Name'
        ChampionshipType:
          $ref: '#/components/schemas/ChampionshipType'
        ChampionshipDiscipline:
          $ref: '#/components/schemas/ChampionshipDiscipline'
        AgeGroup:
          $ref: '#/components/schemas/AgeGroup'
      required:
        - AgeGroup
        - ChampionshipDiscipline
        - ChampionshipId
        - ChampionshipType
        - Name
      xml:
        name: Championship
    ChampionshipDiscipline:
      type: object
      properties:
        Name:
          $ref: '#/components/schemas/Name'
      required:
        - Name
      xml:
        name: ChampionshipDiscipline
    ChampionshipId:
      type: string
      xml:
        name: ChampionshipId
    ChampionshipPosition:
      type: string
      xml:
        name: ChampionshipPosition
    ChampionshipRaceSubType:
      type: string
      xml:
        name: ChampionshipRaceSubType
    ChampionshipResult:
      type: object
      properties:
        ChampionshipId:
          $ref: '#/components/schemas/ChampionshipId'
        ChampionshipPosition:
          $ref: '#/components/schemas/ChampionshipPosition'
      required:
        - ChampionshipId
      xml:
        name: ChampionshipResult
    ChampionshipResultlist:
      type: object
      properties:
        ChampionshipResultlistId:
          $ref: '#/components/schemas/ChampionshipResultlistId'
        ChampionshipRaceSubType:
          $ref: '#/components/schemas/ChampionshipRaceSubType'
        ClassResult:
          type: array
          items:
            $ref: '#/components/schemas/ClassResult'
          xml:
            name: ClassResult
            wrapped: false
        raceClassName:
          type: string
          enum:
            - Men
            - Women
            - OClass
            - PClass
            - Mixed
            - Men-18
            - Women-18
            - Men-16
            - Women-16
            - Men-35
            - Women-35
            - Men-40
            - Women-40
            - Men-45
            - Women-45
            - Men-50
            - Women-50
            - Men-55
            - Women-55
            - Men-60
            - Women-60
            - Men-65
            - Women-65
            - Men-70
            - Women-70
            - Men-75
            - Women-75
            - Men-80
            - Women-80
            - Men-85
            - Women-85
            - Men-90
            - Women-90
            - Men-95
            - Women-95
            - Men-100
            - Women-100
            - NotSet
          default: NotSet
          xml:
            attribute: true
        championshipCompetitionFormat:
          type: string
          enum:
            - Sprint
            - Middle
            - Long
            - UltraLong
            - PreO
            - TempO
            - Masstart
            - Pursuit
            - KnockOutSprint
            - Relay
            - SprintRelay
            - MixedRelay
            - Qualification
            - NotSet
          default: NotSet
          xml:
            attribute: true
      required:
        - ChampionshipRaceSubType
        - ChampionshipResultlistId
      xml:
        name: ChampionshipResultlist
    ChampionshipResultlistId:
      type: string
      xml:
        name: ChampionshipResultlistId
    ChampionshipResults:
      type: object
      xml:
        name: ChampionshipResults
    ChampionshipType:
      type: object
      properties:
        Name:
          $ref: '#/components/schemas/Name'
        ShortName:
          $ref: '#/components/schemas/ShortName'
      required:
        - Name
        - ShortName
      xml:
        name: ChampionshipType
    Championships:
      type: object
      xml:
        name: Championships
    ClassCompetitorCount:
      type: object
      properties:
        eventClassId:
          type: string
          xml:
            attribute: true
        numberOfEntries:
          type: string
          xml:
            attribute: true
        numberOfStarts:
          type: string
          xml:
            attribute: true
      xml:
        name: ClassCompetitorCount
    ClassData:
      type: object
      properties:
        ClassType:
          type: array
          items:
            $ref: '#/components/schemas/ClassType'
          xml:
            name: ClassType
            wrapped: false
        BaseClass:
          type: array
          items:
            $ref: '#/components/schemas/BaseClass'
          xml:
            name: BaseClass
            wrapped: false
      xml:
        name: ClassData
    ClassEntryFee:
      type: object
      properties:
        Sequence:
          $ref: '#/components/schemas/Sequence'
        EventRaceId:
          $ref: '#/components/schemas/EventRaceId'
        isWholeEventFee:
          type: boolean
          default: 'false'
          xml:
            attribute: true
      required:
        - Sequence
      xml:
        name: ClassEntryFee
    ClassRaceInfo:
      type: object
      properties:
        ClassRaceInfoId:
          $ref: '#/components/schemas/ClassRaceInfoId'
        Name:
          $ref: '#/components/schemas/Name'
        CourseLength:
          $ref: '#/components/schemas/CourseLength'
        ClassRaceStatus:
          $ref: '#/components/schemas/ClassRaceStatus'
        PunchingUnitType:
          type: array
          items:
            $ref: '#/components/schemas/PunchingUnitType'
          xml:
            name: PunchingUnitType
            wrapped: false
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
        HashTableEntry:
          type: array
          items:
            $ref: '#/components/schemas/HashTableEntry'
          xml:
            name: HashTableEntry
            wrapped: false
        relayLeg:
          type: string
          xml:
            attribute: true
        minRunners:
          type: string
          xml:
            attribute: true
        maxRunners:
          type: string
          xml:
            attribute: true
        timeResolution:
          type: string
          enum:
            - minutes
            - seconds
            - tens
            - hundreds
          default: seconds
          xml:
            attribute: true
        noOfEntries:
          type: string
          xml:
            attribute: true
        noOfStarts:
          type: string
          xml:
            attribute: true
      required:
        - ClassRaceInfoId
        - ClassRaceStatus
      xml:
        name: ClassRaceInfo
    ClassRaceInfoId:
      type: string
      xml:
        name: ClassRaceInfoId
    ClassRaceInfoList:
      type: object
      properties:
        ClassRaceInfo:
          type: array
          items:
            $ref: '#/components/schemas/ClassRaceInfo'
          xml:
            name: ClassRaceInfo
            wrapped: false
      xml:
        name: ClassRaceInfoList
    ClassRaceStatus:
      type: object
      properties:
        value:
          type: string
          enum:
            - notAllocated
            - finished
            - deletedFee
            - deletedNoFee
            - allocated
            - started
            - notUsed
          xml:
            attribute: true
      required:
        - value
      xml:
        name: ClassRaceStatus
    ClassResult:
      type: object
      properties:
        numberOfEntries:
          type: string
          xml:
            attribute: true
        numberOfStarts:
          type: string
          xml:
            attribute: true
      xml:
        name: ClassResult
    ClassShortName:
      type: string
      xml:
        name: ClassShortName
    ClassStart:
      type: object
      properties:
        numberOfEntries:
          type: string
          xml:
            attribute: true
      xml:
        name: ClassStart
    ClassType:
      type: object
      properties:
        ClassTypeId:
          $ref: '#/components/schemas/ClassTypeId'
        ShortName:
          $ref: '#/components/schemas/ShortName'
        Name:
          $ref: '#/components/schemas/Name'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - ClassTypeId
        - Name
        - ShortName
      xml:
        name: ClassType
    ClassTypeComment:
      type: string
      xml:
        name: ClassTypeComment
    ClassTypeId:
      type: string
      xml:
        name: ClassTypeId
    Clock:
      type: object
      properties:
        _text:
          type: string
        clockFormat:
          type: string
          default: 'HH:MM:SS'
          xml:
            attribute: true
      xml:
        name: Clock
    Comment:
      type: object
      properties:
        _text:
          type: string
        languageId:
          type: string
          xml:
            attribute: true
      xml:
        name: Comment
    Competitor:
      type: object
      properties:
        CompetitorId:
          $ref: '#/components/schemas/CompetitorId'
        PreSelectedClass:
          type: array
          items:
            $ref: '#/components/schemas/PreSelectedClass'
          xml:
            name: PreSelectedClass
            wrapped: false
        CCard:
          type: array
          items:
            $ref: '#/components/schemas/CCard'
          xml:
            name: CCard
            wrapped: false
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - CompetitorId
      xml:
        name: Competitor
    CompetitorCount:
      type: object
      properties:
        ClassCompetitorCount:
          type: array
          items:
            $ref: '#/components/schemas/ClassCompetitorCount'
          xml:
            name: ClassCompetitorCount
            wrapped: false
        OrganisationCompetitorCount:
          type: array
          items:
            $ref: '#/components/schemas/OrganisationCompetitorCount'
          xml:
            name: OrganisationCompetitorCount
            wrapped: false
        eventId:
          type: string
          xml:
            attribute: true
        eventRaceId:
          type: string
          xml:
            attribute: true
        numberOfEntries:
          type: string
          xml:
            attribute: true
        numberOfStarts:
          type: string
          xml:
            attribute: true
      xml:
        name: CompetitorCount
    CompetitorCountList:
      type: object
      properties:
        CompetitorCount:
          type: array
          items:
            $ref: '#/components/schemas/CompetitorCount'
          xml:
            name: CompetitorCount
            wrapped: false
      xml:
        name: CompetitorCountList
    CompetitorId:
      type: string
      xml:
        name: CompetitorId
    CompetitorList:
      type: object
      properties:
        Competitor:
          type: array
          items:
            $ref: '#/components/schemas/Competitor'
          xml:
            name: Competitor
            wrapped: false
      xml:
        name: CompetitorList
    CompetitorStatus:
      type: object
      properties:
        value:
          type: string
          enum:
            - Inactive
            - MisPunch
            - DidNotStart
            - MovedUp
            - OverTime
            - Moved
            - Active
            - Disqualified
            - DidNotFinish
            - Cancelled
            - SportWithdr
            - OK
            - NotCompeting
            - Finished
          xml:
            attribute: true
      required:
        - value
      xml:
        name: CompetitorStatus
    ContactData:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/Address'
        Tele:
          $ref: '#/components/schemas/Tele'
      required:
        - Address
        - Tele
      xml:
        name: ContactData
    ControlCode:
      type: string
      xml:
        name: ControlCode
    Country:
      type: object
      properties:
        CountryId:
          $ref: '#/components/schemas/CountryId'
        Alpha2:
          $ref: '#/components/schemas/Alpha2'
        Alpha3:
          $ref: '#/components/schemas/Alpha3'
        Name:
          type: array
          items:
            $ref: '#/components/schemas/Name'
          xml:
            name: Name
            wrapped: false
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - Alpha2
        - Alpha3
        - CountryId
      xml:
        name: Country
    CountryId:
      type: object
      properties:
        value:
          type: string
          xml:
            attribute: true
      required:
        - value
      xml:
        name: CountryId
    CountryList:
      type: object
      properties:
        Country:
          type: array
          items:
            $ref: '#/components/schemas/Country'
          xml:
            name: Country
            wrapped: false
      xml:
        name: CountryList
    CourseLength:
      type: object
      properties:
        _text:
          type: string
        unit:
          type: string
          enum:
            - ft
            - km
            - m
          default: m
          xml:
            attribute: true
      xml:
        name: CourseLength
    CreateDate:
      type: object
      properties:
        Date:
          $ref: '#/components/schemas/Date'
        Clock:
          $ref: '#/components/schemas/Clock'
      required:
        - Date
      xml:
        name: CreateDate
    CreatedBy:
      type: object
      xml:
        name: CreatedBy
    Data:
      type: string
      xml:
        name: Data
    Date:
      type: object
      properties:
        _text:
          type: string
        dateFormat:
          type: string
          default: YYYY-MM-DD
          xml:
            attribute: true
      xml:
        name: Date
    DeletedEventRaceList:
      type: object
      properties:
        DeletedEventRace:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                xml:
                  attribute: true
              eventId:
                type: integer
                xml:
                  attribute: true
              eventRaceId:
                type: integer
                xml:
                  attribute: true
              deletedTime:
                type: string
                format: date-time
                xml:
                  attribute: true
            required:
              - deletedTime
              - eventId
              - eventRaceId
              - id
          xml:
            name: DeletedEventRace
            wrapped: false
      xml:
        name: DeletedEventRaceList
    Discipline:
      type: object
      properties:
        DisciplineId:
          $ref: '#/components/schemas/DisciplineId'
        Name:
          $ref: '#/components/schemas/Name'
        ModifyDate:
          $ref: '#/components/schemas/ModifyDate'
        ModifiedBy:
          $ref: '#/components/schemas/ModifiedBy'
      required:
        - DisciplineId
        - Name
      xml:
        name: Discipline
    DisciplineId:
      type: string
      xml:
        name: DisciplineId
    DisciplineList:
      type: object
      properties:
        Discipline:
          type: array
          items:
            $ref: '#/components/schemas/Discipline'
          xml:
            name: Discipline
            wrapped: false
      xml:
        name: DisciplineList
    DiversityDataList:
      type: object
      properties:
        DiversityData:
          type: array
          items:
            type: object
            properties:
              IndigenousPeople:
                type: string
              Gender:
                type: string
              LGBTQ:
                type: string
              CulturalDiversity:
                type: string
              DisabilityStatus:
                type: string
              Sex:
                type: string
              Age:
                type: integer
              State:
                type: string
            required:
              - Age
              - CulturalDiversity
              - DisabilityStatus
              - Gender
